# Safe read-only and common development commands.
# These are auto-approved to avoid repetitive confirmation prompts.

# ── File inspection ──────────────────────────────────────────────
[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "cat",
  "head",
  "tail",
  "less",
  "wc",
  "file",
  "stat",
  "md5sum",
  "sha256sum",
]
decision = "allow"
priority = 100

# ── Directory navigation ─────────────────────────────────────────
[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "ls",
  "tree",
  "find",
  "fd",
  "pwd",
  "basename",
  "dirname",
  "realpath",
]
decision = "allow"
priority = 100

# ── Search ───────────────────────────────────────────────────────
[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "grep",
  "rg",
  "ag",
  "awk",
  "sed -n",
  "sort",
  "uniq",
  "diff",
  "comm",
]
decision = "allow"
priority = 100

# ── Environment & system info ────────────────────────────────────
[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "echo",
  "env",
  "printenv",
  "which",
  "type",
  "whoami",
  "id",
  "uname",
  "date",
  "hostname",
]
decision = "allow"
priority = 100

# ── Git (all operations) ────────────────────────────────────────
[[rule]]
toolName = "run_shell_command"
commandPrefix = ["git", "gh"]
decision = "allow"
priority = 100

# ── Build & test ─────────────────────────────────────────────────
[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "make",
  "go build",
  "go test",
  "go vet",
  "go mod",
  "npm test",
  "npm run",
  "npx",
  "pnpm",
  "yarn",
  "cargo build",
  "cargo test",
  "cargo check",
  "cargo clippy",
  "python -m pytest",
  "python -m mypy",
  "composer",
  "php artisan",
  "phpunit",
]
decision = "allow"
priority = 100

# ── File management (non-destructive) ───────────────────────────
[[rule]]
toolName = "run_shell_command"
commandPrefix = ["mkdir", "touch", "cp", "mv"]
decision = "allow"
priority = 100

# ── Package info ─────────────────────────────────────────────────
[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "apt list",
  "dpkg -l",
  "pip list",
  "pip show",
  "npm list",
  "npm info",
  "go list",
]
decision = "allow"
priority = 100

# ── Containers ───────────────────────────────────────────────────
[[rule]]
toolName = "run_shell_command"
commandPrefix = ["docker", "docker-compose"]
decision = "allow"
priority = 100

# ── Network (read-only) ─────────────────────────────────────────
[[rule]]
toolName = "run_shell_command"
commandPrefix = ["curl", "wget"]
decision = "allow"
priority = 100

# ── Dangerous commands ───────────────────────────────────────────
[[rule]]
toolName = "run_shell_command"
commandRegex = "rm -rf /|sudo|su |shutdown|reboot|mkfs|dd if=|:(){ :|eval "
decision = "deny"
deny_message = "Blocked: potentially destructive system command"
priority = 200
