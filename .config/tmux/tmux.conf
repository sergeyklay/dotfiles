unbind C-b
set -g prefix C-z
bind C-z send-prefix

set -sg escape-time 0
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g focus-events on

# resize to current client, not smallest attached
setw -g aggressive-resize on

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

set -g set-titles on
set -g set-titles-string "#h: #W"
set -g display-time 2000
set -g display-panes-time 2000

# --- Key bindings ---
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"

bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

bind -r C-Left resize-pane -L 5
bind -r C-Right resize-pane -R 5
bind -r C-Up resize-pane -U 5
bind -r C-Down resize-pane -D 5

bind -n S-Left previous-window
bind -n S-Right next-window

bind m set-option -g mouse \; display "Mouse: #{?mouse,ON,OFF}"

# --- Status bar ---
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=colour235,fg=colour248"

set -g status-left-length 30
set -g status-left "#[fg=colour232,bg=colour39,bold] #S #[default] "

set -g status-right-length 60
set -g status-right "#[fg=colour248] #h #[fg=colour232,bg=colour39,bold] %H:%M "

setw -g window-status-current-style "fg=colour232,bg=colour39,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-style "fg=colour248,bg=colour235"
setw -g window-status-format " #I:#W "

setw -g monitor-activity on
set -g visual-activity off
setw -g window-status-activity-style "fg=colour220,bg=colour235"

set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'

run '~/.tmux/plugins/tpm/tpm'
